<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Paper Tracker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <h1>Paper Tracker</h1>
        <p class="subtitle">Multi-user phase (Aravind, Andreas, Max)</p>
      </header>

      <section class="card">
        <h2>Legend</h2>
        <div class="legend" aria-hidden="true">
          <span>Less</span>
          <i class="cell level0"></i>
          <i class="cell level1"></i>
          <i class="cell level2"></i>
          <i class="cell level3"></i>
          <span>More</span>
        </div>
      </section>

      <section id="usersGrid" class="users-grid" aria-label="User cards"></section>

      <p id="status" class="status" role="status"></p>
    </main>
    <script type="module" src="script.js"></script>
  </body>
</html>
